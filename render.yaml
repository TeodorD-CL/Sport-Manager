services:
  - type: web
    name: sport-manager-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromService:
          type: web
          name: sport-manager-web
          property: url
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: sport-manager-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sport-manager-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: sport-manager-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: sport-manager-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sport-manager-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: RUN_MIGRATIONS
        value: "true"

  - type: worker
    name: sport-manager-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    plan: free
    dockerCommand: php artisan queue:work --tries=1 --sleep=3
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromService:
          type: web
          name: sport-manager-web
          property: url
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: sport-manager-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sport-manager-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: sport-manager-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: sport-manager-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sport-manager-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: RUN_MIGRATIONS
        value: "false"

databases:
  - name: sport-manager-db
    plan: free
